<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>慢活靈感指南</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SlowLivingCompass.Client.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#F9F8F4 0%,#EFEBE1 100%);font-family:'Noto Serif TC',serif;">
            <div style="font-size:3rem;margin-bottom:1rem;animation:pulse 2s infinite ease-in-out;">🌿</div>
            <div style="font-size:1.2rem;color:#7A9D54;font-weight:600;letter-spacing:3px;">慢活靈感指南</div>
            <div style="font-size:0.85rem;color:#A0A59A;margin-top:0.8rem;letter-spacing:2px;">正在為您沖泡靈感...</div>
            <div style="width:120px;height:3px;background:#E9EDC9;border-radius:2px;margin-top:1.5rem;overflow:hidden;">
                <div style="width:40%;height:100%;background:#7A9D54;border-radius:2px;animation:loading-bar 1.5s ease-in-out infinite;"></div>
            </div>
        </div>
        <style>
            @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
            @keyframes loading-bar{0%{width:10%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:10%;margin-left:90%}}
        </style>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
    <script>
        window.getUserGeolocation = function () {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    resolve(null);
                } else {
                    navigator.geolocation.getCurrentPosition(
                        position => {
                            resolve({
                                latitude: position.coords.latitude,
                                longitude: position.coords.longitude
                            });
                        },
                        error => {
                            resolve(null); // return null on denial/error to fallback gracefully
                        }, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                    );
                }
            });
        };
    </script>
</body>

</html>
